# Alembic Configuration

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for file timestamps
timezone = UTC

# Max length of characters in slug field
truncate_slug_length = 40

# Set to 'true' to run migrations in offline mode
prepend_sys_path = .

# SQLAlchemy URL (can be overridden by env.py)
sqlalchemy.url = postgresql+asyncpg://airshield:airshield_secret@localhost:5432/airshield_db

[post_write_hooks]
# Hooks to run after migration is written (e.g., black formatter)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
