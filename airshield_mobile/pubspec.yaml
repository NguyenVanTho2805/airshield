name: airshield_mobile
description: >-
  AirShield - Comprehensive air quality monitoring and smart home control.
  Track AQI, manage air purifiers, create automation rules, and protect 
  your health with real-time air quality insights.
publish_to: 'none'
version: 1.0.0+1
homepage: https://github.com/yourusername/airshield
repository: https://github.com/yourusername/airshield

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.4.0
  
  # Dependency Injection
  get_it: ^7.6.0
  injectable: ^2.3.2
  
  # Navigation
  go_router: ^13.0.0
  
  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # UI & Styling
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8
  
  # Utilities
  intl: ^0.20.2
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  package_info_plus: ^9.0.1
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  geolocator: ^13.0.0
  sentry_flutter: ^9.0.0
  url_launcher: ^6.3.0
  
  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^17.2.4
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  
  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Assets configuration
  # assets:
  #   - assets/images/
  #   - assets/icons/
